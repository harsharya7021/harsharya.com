<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Only Fans — Harsh Kumar Arya</title>
<meta name="robots" content="noindex" />
<meta name="description" content="Only Fans. The cooling kind. omg, could you imagine??" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:#000; color:#fff;
    font-family:'Fredoka',system-ui,sans-serif;
    min-height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:48px 20px; overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .of-title{
    font-weight:700; line-height:.9; letter-spacing:-.02em;
    font-size:clamp(64px,15vw,200px);
    text-shadow:0 6px 0 rgba(255,255,255,.06);
  }
  .of-title .blue{ color:#00AFF0; }   /* the only-fans wink */
  .sub{
    font-family:'Space Mono',monospace; font-weight:400;
    letter-spacing:.12em; text-transform:uppercase;
    font-size:clamp(10px,1.5vw,13px); color:#8a8a8a;
    margin-top:14px;
  }

  /* ── the fans ── */
  .fans{
    display:flex; flex-wrap:wrap; align-items:center; justify-content:center;
    gap:clamp(18px,4vw,48px);
    margin:clamp(40px,7vh,80px) 0 clamp(34px,6vh,64px);
    max-width:1000px;
  }
  .fan{ display:block; width:clamp(96px,15vw,168px); height:auto; filter:drop-shadow(0 10px 22px rgba(0,0,0,.6)); }
  .blades{ transform-origin:center; animation:spin 1.1s linear infinite; }
  .blades.slow{ animation-duration:3.4s; }
  .blades.med{ animation-duration:1.9s; }
  .blades.rev{ animation-direction:reverse; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .handfan{ transform-origin:bottom center; animation:sway 3.6s ease-in-out infinite; }
  @keyframes sway{ 0%,100%{ transform:rotate(-9deg); } 50%{ transform:rotate(9deg); } }

  .tag{
    font-weight:600; font-size:clamp(22px,4vw,40px); line-height:1.15;
  }
  .tag .em{ color:#00AFF0; font-style:normal; }

  .home{
    display:inline-flex; align-items:center; gap:9px;
    margin-top:clamp(26px,5vh,44px);
    font-family:'Space Mono',monospace; font-size:14px; letter-spacing:.04em;
    color:#000; background:#fff; text-decoration:none;
    padding:13px 22px; border-radius:40px; font-weight:700;
    transition:transform .15s ease, background .15s ease;
  }
  .home:hover{ transform:translateY(-2px); background:#00AFF0; color:#fff; }
  .home span{ transition:transform .2s ease; }
  .home:hover span{ transform:translateX(-4px); }

  .fine{ margin-top:30px; font-family:'Space Mono',monospace; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:#444; }

  @media (prefers-reduced-motion:reduce){ .blades,.handfan{ animation:none; } }
</style>
</head>
<body>

  <h1 class="of-title">Only F<span class="blue">a</span>ns</h1>
  <p class="sub">est. whenever it got too hot · 100% cooling · 0% subscription</p>

  <div class="fans" aria-hidden="true">

    <!-- ceiling fan -->
    <svg class="fan" viewBox="0 0 200 200" style="width:clamp(110px,17vw,190px)">
      <rect x="96" y="18" width="8" height="34" rx="3" fill="#9aa0a6"/>
      <circle cx="100" cy="100" r="20" fill="#c9ced3"/>
      <g class="blades slow">
        <ellipse cx="100" cy="44" rx="20" ry="56" fill="#b5651d"/>
        <ellipse cx="156" cy="100" rx="56" ry="20" fill="#a85916"/>
        <ellipse cx="100" cy="156" rx="20" ry="56" fill="#b5651d"/>
        <ellipse cx="44" cy="100" rx="56" ry="20" fill="#a85916"/>
        <circle cx="100" cy="100" r="14" fill="#7a3e10"/>
      </g>
      <circle cx="100" cy="100" r="7" fill="#d9b06a"/>
    </svg>

    <!-- pedestal fan -->
    <svg class="fan" viewBox="0 0 160 230">
      <rect x="74" y="120" width="12" height="78" fill="#1f9fd6"/>
      <ellipse cx="80" cy="206" rx="46" ry="13" fill="#1483b6"/>
      <rect x="50" y="198" width="60" height="9" rx="4" fill="#1f9fd6"/>
      <circle cx="80" cy="70" r="64" fill="none" stroke="#bfe6f7" stroke-width="3"/>
      <g stroke="#bfe6f7" stroke-width="2" opacity=".7">
        <line x1="80" y1="8" x2="80" y2="132"/><line x1="18" y1="70" x2="142" y2="70"/>
        <line x1="36" y1="26" x2="124" y2="114"/><line x1="124" y1="26" x2="36" y2="114"/>
      </g>
      <g class="blades med" style="transform-box:fill-box" transform="translate(80 70)">
        <path d="M0,0 C26,-30 50,-18 40,8 C18,2 6,4 0,0Z" fill="#7fd0f2"/>
        <g transform="rotate(120)"><path d="M0,0 C26,-30 50,-18 40,8 C18,2 6,4 0,0Z" fill="#54bfeb"/></g>
        <g transform="rotate(240)"><path d="M0,0 C26,-30 50,-18 40,8 C18,2 6,4 0,0Z" fill="#7fd0f2"/></g>
      </g>
      <circle cx="80" cy="70" r="11" fill="#0d6e9c"/>
    </svg>

    <!-- table fan -->
    <svg class="fan" viewBox="0 0 170 170" style="width:clamp(96px,13vw,148px)">
      <rect x="70" y="120" width="30" height="22" fill="#cf3b3b"/>
      <ellipse cx="85" cy="150" rx="44" ry="12" fill="#b32e2e"/>
      <circle cx="85" cy="72" r="62" fill="none" stroke="#f1c4c4" stroke-width="3"/>
      <g stroke="#f1c4c4" stroke-width="2" opacity=".7">
        <line x1="85" y1="12" x2="85" y2="132"/><line x1="25" y1="72" x2="145" y2="72"/>
        <line x1="41" y1="30" x2="129" y2="114"/><line x1="129" y1="30" x2="41" y2="114"/>
      </g>
      <g class="blades rev" style="transform-box:fill-box" transform="translate(85 72)">
        <path d="M0,0 C28,-26 52,-10 38,12 C16,4 6,4 0,0Z" fill="#ff6b6b"/>
        <g transform="rotate(90)"><path d="M0,0 C28,-26 52,-10 38,12 C16,4 6,4 0,0Z" fill="#e85151"/></g>
        <g transform="rotate(180)"><path d="M0,0 C28,-26 52,-10 38,12 C16,4 6,4 0,0Z" fill="#ff6b6b"/></g>
        <g transform="rotate(270)"><path d="M0,0 C28,-26 52,-10 38,12 C16,4 6,4 0,0Z" fill="#e85151"/></g>
      </g>
      <circle cx="85" cy="72" r="10" fill="#8e2020"/>
    </svg>

    <!-- folded hand fan -->
    <svg class="fan handfan" viewBox="0 0 180 170" style="width:clamp(90px,12vw,140px)">
      <path d="M90 150 L8 56 A104 104 0 0 1 172 56 Z" fill="#ffd23f"/>
      <g stroke="#caa01f" stroke-width="2" fill="none">
        <path d="M90 150 L8 56"/><path d="M90 150 L33 38"/><path d="M90 150 L62 28"/>
        <path d="M90 150 L90 24"/><path d="M90 150 L118 28"/><path d="M90 150 L147 38"/><path d="M90 150 L172 56"/>
      </g>
      <path d="M8 56 A104 104 0 0 1 172 56" fill="none" stroke="#caa01f" stroke-width="3"/>
      <circle cx="90" cy="150" r="8" fill="#7a3e10"/>
    </svg>

    <!-- mini handheld fan -->
    <svg class="fan" viewBox="0 0 120 190" style="width:clamp(70px,9vw,104px)">
      <rect x="50" y="104" width="20" height="74" rx="9" fill="#ff8c42"/>
      <circle cx="60" cy="62" r="50" fill="none" stroke="#ffd9bd" stroke-width="3"/>
      <g class="blades" style="transform-box:fill-box" transform="translate(60 62)">
        <path d="M0,0 C20,-22 40,-10 30,8 C12,3 5,3 0,0Z" fill="#ffb37a"/>
        <g transform="rotate(120)"><path d="M0,0 C20,-22 40,-10 30,8 C12,3 5,3 0,0Z" fill="#ff9a52"/></g>
        <g transform="rotate(240)"><path d="M0,0 C20,-22 40,-10 30,8 C12,3 5,3 0,0Z" fill="#ffb37a"/></g>
      </g>
      <circle cx="60" cy="62" r="8" fill="#cc5b16"/>
    </svg>

  </div>

  <p class="tag">omg, <span class="em">could you imagine??</span></p>

  <a class="home" href="/"><span>&larr;</span> take me back to reality</a>

  <p class="fine">no, but seriously — these are very good at cooling.</p>

</body>
</html>
