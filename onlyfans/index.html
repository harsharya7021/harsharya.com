<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Only Fans — Harsh Kumar Arya</title>
<meta name="robots" content="noindex" />
<meta name="description" content="Only Fans. The cooling kind. omg, could you imagine??" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:#000; color:#fff;
    font-family:'Fredoka',system-ui,sans-serif;
    min-height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:44px 20px; overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .rise{ opacity:0; transform:translateY(16px); animation:rise .7s cubic-bezier(.16,1,.3,1) forwards; }
  .rise.d1{ animation-delay:.06s; } .rise.d2{ animation-delay:.16s; } .rise.d3{ animation-delay:.26s; }
  @keyframes rise{ to{ opacity:1; transform:none; } }

  .of-title{
    font-weight:700; line-height:.9; letter-spacing:-.02em;
    font-size:clamp(64px,15vw,200px);
    text-shadow:0 6px 0 rgba(255,255,255,.06);
  }
  .of-title .blue{ color:#00AFF0; }   /* the only-fans wink */

  .fans-wrap{ width:min(680px,93vw); margin:clamp(26px,5vh,58px) auto clamp(22px,4.5vh,52px); }
  .fans-img{
    display:block; width:100%; height:auto;
    filter:drop-shadow(0 22px 46px rgba(0,0,0,.7));
    animation:floaty 6.5s ease-in-out infinite;
  }
  @keyframes floaty{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-12px); } }

  .tag{ font-weight:600; font-size:clamp(22px,4vw,40px); line-height:1.15; }
  .tag .em{ color:#00AFF0; }

  .home{
    display:inline-flex; align-items:center; gap:9px;
    margin-top:clamp(26px,5vh,44px);
    font-family:'Space Mono',monospace; font-size:14px; letter-spacing:.04em;
    color:#000; background:#fff; text-decoration:none;
    padding:13px 22px; border-radius:40px; font-weight:700;
    transition:transform .15s ease, background .15s ease, color .15s ease;
  }
  .home:hover{ transform:translateY(-2px); background:#00AFF0; color:#fff; }
  .home span{ transition:transform .2s ease; }
  .home:hover span{ transform:translateX(-4px); }

  .fine{ margin-top:30px; font-family:'Space Mono',monospace; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:#444; }

  @media (prefers-reduced-motion:reduce){ .rise,.fans-img{ animation:none; opacity:1; transform:none; } }
</style>
</head>
<body>

  <h1 class="of-title rise">Only F<span class="blue">a</span>ns</h1>

  <div class="fans-wrap rise d1">
    <picture>
      <source srcset="../assets/onlyfans-fans.webp" type="image/webp">
      <img class="fans-img" src="../assets/onlyfans-fans.png" alt="An unreasonable number of fans" width="1000" height="1000" />
    </picture>
  </div>

  <p class="tag rise d2">omg, <span class="em">could you imagine??</span></p>

  <a class="home rise d3" href="/"><span>&larr;</span> take me back to reality</a>

  <p class="fine">no, but seriously — these are very good at cooling.</p>

</body>
</html>
